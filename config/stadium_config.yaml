# OAI CN5G Stadium Configuration
# Single config file shared by all NFs (v2.1.0 pattern)

log_level:
  general: info

register_nf:
  general: yes

http_version: 2

# ── NF endpoints ─────────────────────────────────────────────
nfs:
  amf:
    host: oai-amf
    sbi:
      port: 8080
      api_version: v1
      interface_name: eth0
    n2:
      interface_name: eth0
      port: 38412
  smf:
    host: oai-smf
    sbi:
      port: 8080
      api_version: v1
      interface_name: eth0
    n4:
      interface_name: eth0
      port: 8805
  upf_mec:
    host: oai-upf-mec
    sbi:
      port: 8080
      api_version: v1
      interface_name: eth0
    n3:
      interface_name: eth0
      port: 2152
    n4:
      interface_name: eth0
      port: 8805
    n6:
      interface_name: eth0
    n9:
      interface_name: eth0
      port: 2152
  upf_cc:
    host: oai-upf-cc
    sbi:
      port: 8080
      api_version: v1
      interface_name: eth0
    n3:
      interface_name: eth0
      port: 2152
    n4:
      interface_name: eth0
      port: 8805
    n6:
      interface_name: eth0
    n9:
      interface_name: eth0
      port: 2152
  udm:
    host: oai-udm
    sbi:
      port: 8080
      api_version: v1
      interface_name: eth0
  udr:
    host: oai-udr
    sbi:
      port: 8080
      api_version: v1
      interface_name: eth0
  ausf:
    host: oai-ausf
    sbi:
      port: 8080
      api_version: v1
      interface_name: eth0
  nrf:
    host: oai-nrf
    sbi:
      port: 8080
      api_version: v1
      interface_name: eth0
  nssf:
    host: oai-nssf
    sbi:
      port: 8080
      api_version: v1
      interface_name: eth0

# ── Database ──────────────────────────────────────────────────
database:
  host: mysql
  user: test
  type: mysql
  password: test
  database_name: oai_db
  generate_random: true
  connection_timeout: 300

# ── SNSSAI anchors ────────────────────────────────────────────
snssais:
  - &embb_slice
    sst: 1
    sd: "FFFFFF"
  - &urllc_slice
    sst: 2
    sd: "FFFFFF"

# ── AMF ───────────────────────────────────────────────────────
amf:
  amf_name: "OAI-AMF-Stadium"
  support_features_options:
    enable_simple_scenario: no
    enable_nssf: no
    enable_smf_selection: yes
  relative_capacity: 30
  statistics_timer_interval: 20
  emergency_support: false
  served_guami_list:
    - mcc: 001
      mnc: 01
      amf_region_id: 01
      amf_set_id: 001
      amf_pointer: 01
  plmn_support_list:
    - mcc: 001
      mnc: 01
      tac: 0x0001
      nssai:
        - *embb_slice
        - *urllc_slice
  supported_integrity_algorithms:
    - "NIA0"
    - "NIA1"
    - "NIA2"
  supported_encryption_algorithms:
    - "NEA0"
    - "NEA1"
    - "NEA2"

# ── SMF ───────────────────────────────────────────────────────
smf:
  ue_mtu: 1500
  support_features:
    use_local_subscription_info: yes
    use_local_pcc_rules: yes
  upfs:
    - host: oai-upf-mec
      config:
        enable_usage_reporting: no
    - host: oai-upf-cc
      config:
        enable_usage_reporting: no
  ue_dns:
    primary_ipv4: "8.8.8.8"
    primary_ipv6: "2001:4860:4860::8888"
    secondary_ipv4: "8.8.4.4"
    secondary_ipv6: "2001:4860:4860::8844"
  ims:
    pcscf_ipv4: "127.0.0.1"
    pcscf_ipv6: "fe80::7915:f408:1787:db8b"
  smf_info:
    sNssaiSmfInfoList:
      - sNssai: *embb_slice
        dnnSmfInfoList:
          - dnn: "oai"
      - sNssai: *urllc_slice
        dnnSmfInfoList:
          - dnn: "oai2"
  local_subscription_infos:
    - single_nssai: *embb_slice
      dnn: "oai"
      qos_profile:
        5qi: 6
        session_ambr_ul: "200Mbps"
        session_ambr_dl: "400Mbps"
    - single_nssai: *urllc_slice
      dnn: "oai2"
      qos_profile:
        5qi: 82
        session_ambr_ul: "50Mbps"
        session_ambr_dl: "50Mbps"

# ── UPF (applies to both UPF-MEC and UPF-CC) ─────────────────
upf:
  support_features:
    enable_bpf_datapath: no
    enable_snat: yes
  remote_n6_gw: localhost
  smfs:
    - host: oai-smf
  upf_info:
    sNssaiUpfInfoList:
      - sNssai: *embb_slice
        dnnUpfInfoList:
          - dnn: "oai"
      - sNssai: *urllc_slice
        dnnUpfInfoList:
          - dnn: "oai2"

# ── DNNs ──────────────────────────────────────────────────────
dnns:
  - dnn: "oai"
    pdu_session_type: "IPV4"
    ipv4_subnet: "12.1.1.0/24"
  - dnn: "oai2"
    pdu_session_type: "IPV4"
    ipv4_subnet: "12.2.1.0/24"

# ── NSSF ──────────────────────────────────────────────────────
nssf:
  slice_config_path: /openair-nssf/etc/nssf_slice_config.yaml
