upf:
  host: oai-upf-mec
  sbi:
    port: 8080
    api_version: v1
    interface_name: eth0
  n3:
    interface_name: eth0
  n4:
    interface_name: eth0
  n6:
    interface_name: eth0
  n9:
    interface_name: eth0

dnns:
  - dnn: oai
    pdu_session_type: IPV4
    ipv4_pool: 12.1.1.0/24
    ipv4_mtu: 1500
  - dnn: oai2
    pdu_session_type: IPV4
    ipv4_pool: 12.2.1.0/24
    ipv4_mtu: 1500

nrf:
  host: oai-nrf
  sbi:
    port: 80
    api_version: v1
    interface_name: eth0

smf:
  host: oai-smf
  sbi:
    port: 80
    api_version: v1

register_nrf: yes
