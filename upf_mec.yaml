# OAI UPF MEC Configuration (Edge)
log_level:
  general: debug

register_nf:
  general: yes

http_version: 2

nfs:
  upf:
    host: oai-upf-mec
    sbi:
      port: 8080
      api_version: v1
      interface_name: eth0
    n3:
      interface_name: eth0
      port: 2152
    n4:
      interface_name: eth0
      port: 8805
    n6:
      interface_name: eth0
    n9:
      interface_name: eth0
      port: 2152

database:
  host: mysql
  user: test
  type: mysql
  password: test
  database_name: oai_db
  generate_random: true
  connection_timeout: 300

snssais:
  - &embb_slice
    sst: 1
    sd: "FFFFFF"
  - &urllc_slice
    sst: 2
    sd: "FFFFFF"

upf:
  support_features:
    enable_bpf_datapath: no
    enable_snat: yes
  remote_n6_gw: localhost
  smfs:
    - host: oai-smf
  upf_info:
    sNssaiUpfInfoList:
      - sNssai: *embb_slice
        dnnUpfInfoList:
          - dnn: "oai"
          - dnn: "oai2"
      - sNssai: *urllc_slice
        dnnUpfInfoList:
          - dnn: "oai"
          - dnn: "oai2"
    capacity: 100
    priority: 50

dnns:
  - dnn: "oai"
    pdu_session_type: "IPV4"
    ipv4_subnet: "12.1.1.0/24"
  - dnn: "oai2"
    pdu_session_type: "IPV4"
    ipv4_subnet: "12.2.1.0/24"
