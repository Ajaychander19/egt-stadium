version: '3.8'

# Stadium 5G core — 2 UPF deployment
# All NFs share a single config file: config/stadium_config.yaml

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_DATABASE:      oai_db
      MYSQL_USER:          test
      MYSQL_PASSWORD:      test
      MYSQL_ROOT_PASSWORD: linux
    volumes:
      - ./oai_db.sql:/docker-entrypoint-initdb.d/oai_db.sql
    networks:
      stadium_net:
        ipv4_address: 192.168.70.131
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-utest", "-ptest"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  oai-nrf:
    image: oaisoftwarealliance/oai-nrf:v2.1.0
    container_name: oai-nrf
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./config/stadium_config.yaml:/openair-nrf/etc/config.yaml
    networks:
      stadium_net:
        ipv4_address: 192.168.70.130
    depends_on:
      mysql:
        condition: service_healthy

  oai-udr:
    image: oaisoftwarealliance/oai-udr:v2.1.0
    container_name: oai-udr
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./config/stadium_config.yaml:/openair-udr/etc/config.yaml
    networks:
      stadium_net:
        ipv4_address: 192.168.70.136
    depends_on:
      mysql:
        condition: service_healthy
      oai-nrf:
        condition: service_started

  oai-udm:
    image: oaisoftwarealliance/oai-udm:v2.1.0
    container_name: oai-udm
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./config/stadium_config.yaml:/openair-udm/etc/config.yaml
    networks:
      stadium_net:
        ipv4_address: 192.168.70.137
    depends_on:
      - oai-udr

  oai-ausf:
    image: oaisoftwarealliance/oai-ausf:v2.1.0
    container_name: oai-ausf
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./config/stadium_config.yaml:/openair-ausf/etc/config.yaml
    networks:
      stadium_net:
        ipv4_address: 192.168.70.138
    depends_on:
      - oai-udm

  oai-nssf:
    image: oaisoftwarealliance/oai-nssf:v2.1.0
    container_name: oai-nssf
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./config/stadium_config.yaml:/openair-nssf/etc/config.yaml
      - ./config/nssf_slice_config.yaml:/openair-nssf/etc/nssf_slice_config.yaml
    networks:
      stadium_net:
        ipv4_address: 192.168.70.139
    depends_on:
      - oai-nrf

  oai-amf:
    image: oaisoftwarealliance/oai-amf:v2.1.0
    container_name: oai-amf
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./config/stadium_config.yaml:/openair-amf/etc/config.yaml
    networks:
      stadium_net:
        ipv4_address: 192.168.70.132
    depends_on:
      - oai-ausf
      - oai-udm
      - oai-nssf

  oai-smf:
    image: oaisoftwarealliance/oai-smf:v2.1.0
    container_name: oai-smf
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./config/stadium_config.yaml:/openair-smf/etc/config.yaml
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      stadium_net:
        ipv4_address: 192.168.70.133
    depends_on:
      - oai-amf

  oai-upf-mec:
    image: oaisoftwarealliance/oai-upf:v2.1.0
    container_name: oai-upf-mec
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./config/stadium_config.yaml:/openair-upf/etc/config.yaml
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    privileged: true
    networks:
      stadium_net:
        ipv4_address: 192.168.70.140
    depends_on:
      - oai-smf

  oai-upf-cc:
    image: oaisoftwarealliance/oai-upf:v2.1.0
    container_name: oai-upf-cc
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./config/stadium_config.yaml:/openair-upf/etc/config.yaml
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    privileged: true
    networks:
      stadium_net:
        ipv4_address: 192.168.70.141
    depends_on:
      - oai-smf

  oai-gnb:
    image: oaisoftwarealliance/oai-gnb:v2.1.0
    container_name: oai-gnb
    privileged: true
    environment:
      TZ: Europe/Paris
      RFSIMULATOR: server
      USE_ADDITIONAL_OPTIONS: -E --rfsim --log_config.global_log_options level,nocolor,time
    volumes:
      - ./config/gnb.conf:/opt/oai-gnb/etc/gnb.conf
    networks:
      stadium_net:
        ipv4_address: 192.168.70.150
    depends_on:
      - oai-amf
      - oai-upf-mec
      - oai-upf-cc

  oai-ue-embb:
    image: oaisoftwarealliance/oai-nr-ue:v2.1.0
    container_name: oai-ue-embb
    privileged: true
    environment:
      TZ: Europe/Paris
      RFSIMULATOR: 192.168.70.150
      USE_ADDITIONAL_OPTIONS: -E --rfsim -r 106 --numerology 1 -C 3319680000 --band 78 --log_config.global_log_options level,nocolor,time
    volumes:
      - ./config/ue_embb.conf:/opt/oai-nr-ue/etc/nr-ue.conf
    cap_add:
      - NET_ADMIN
    networks:
      stadium_net:
        ipv4_address: 192.168.70.151
    depends_on:
      - oai-gnb

  oai-ue-urllc:
    image: oaisoftwarealliance/oai-nr-ue:v2.1.0
    container_name: oai-ue-urllc
    privileged: true
    environment:
      TZ: Europe/Paris
      RFSIMULATOR: 192.168.70.150
      USE_ADDITIONAL_OPTIONS: -E --rfsim -r 106 --numerology 1 -C 3319680000 --band 78 --log_config.global_log_options level,nocolor,time
    volumes:
      - ./config/ue_urllc.conf:/opt/oai-nr-ue/etc/nr-ue.conf
    cap_add:
      - NET_ADMIN
    networks:
      stadium_net:
        ipv4_address: 192.168.70.152
    depends_on:
      - oai-gnb

  gnbsim:
    build:
      context: ../gnbsim
      dockerfile: ../egt-stadium/Dockerfile.gnbsim
    container_name: gnbsim
    privileged: true
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./config/gnbsim.json:/gnbsim/bin/gnbsim.json
    networks:
      stadium_net:
        ipv4_address: 192.168.70.160
    command: sh -c "sleep 5 && ./example 2>&1"
    depends_on:
      - oai-amf
      - oai-upf-mec
      - oai-upf-cc

networks:
  stadium_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.70.128/26
          gateway: 192.168.70.129
